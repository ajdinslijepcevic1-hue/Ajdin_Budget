<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .input-clean { background: transparent; border: none; outline: none; width: 100%; font-weight: 800; }
        .tab-active { color: #6366f1; border-bottom: 3px solid #6366f1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Animationen für flüssiges UI */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-indigo-600 flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center space-y-8 fade-in">
            <div>
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-slate-400 mb-2">Budget Pro Login</h2>
                <p class="text-slate-500 text-sm">Bitte Code eingeben</p>
            </div>
            <div class="flex justify-center gap-2">
                <input type="password" maxlength="6" id="login-code" placeholder="••••••" 
                       class="text-3xl tracking-[0.5em] text-center w-full py-4 bg-slate-100 rounded-2xl border-none focus:ring-4 focus:ring-indigo-100 transition-all font-black">
            </div>
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 shadow-lg active:scale-95 transition-all">
                Zugriff prüfen
            </button>
        </div>
    </div>

    <!-- Main App UI (Initial Hidden) -->
    <div id="app-ui" class="hidden opacity-0 transition-opacity duration-500">
        <header class="sticky top-0 z-50 glass border-b border-slate-200/50 px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xs">B</div>
                <div>
                    <h1 class="text-sm font-black tracking-tight text-slate-800 uppercase">BUDGET PRO</h1>
                    <div class="flex items-center gap-1.5">
                        <span id="sync-dot" class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
                        <p id="status-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Initialisiere...</p>
                    </div>
                </div>
            </div>
            <button onclick="window.print()" class="p-2.5 bg-slate-100 rounded-xl text-slate-500 hover:bg-slate-200 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
        </header>

        <nav class="flex border-b border-slate-200 bg-white sticky top-[77px] z-40">
            <button id="nav-planner" onclick="switchTab('planner')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] tab-active">Planer</button>
            <button id="nav-archive" onclick="switchTab('archive')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Archiv</button>
        </nav>

        <main class="max-w-2xl mx-auto p-4 space-y-6 pb-32">
            <!-- Tab: Planner -->
            <div id="view-planner" class="space-y-6 fade-in">
                <!-- Dashboard Card -->
                <div class="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Verfügbares Restbudget</p>
                        <h2 id="display-saved" class="text-5xl font-black mb-10 tracking-tighter">CHF 0.00</h2>
                        <div class="grid grid-cols-2 gap-8 pt-8 border-t border-white/10">
                            <div>
                                <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Einnahmen</p>
                                <p id="display-inc" class="font-black text-lg">CHF 0.00</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Gesamtausgaben</p>
                                <p id="display-exp" class="font-black text-lg">CHF 0.00</p>
                            </div>
                        </div>
                    </div>
                    <div class="absolute -right-20 -top-20 w-64 h-64 bg-indigo-600/20 blur-[100px] rounded-full"></div>
                </div>

                <!-- Section: Income -->
                <section class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-indigo-600 mb-6 tracking-widest">Monatliche Einnahmen</h3>
                    <div class="space-y-4">
                        <div class="p-5 bg-slate-50 rounded-2xl flex justify-between items-center group focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                            <span class="text-xs font-bold text-slate-500 uppercase">Hauptlohn</span>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-black opacity-20">CHF</span>
                                <input type="number" id="inc-main" oninput="saveAndSync()" class="input-clean text-right w-28">
                            </div>
                        </div>
                        <div class="p-5 bg-slate-50 rounded-2xl flex justify-between items-center group focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                            <span class="text-xs font-bold text-slate-500 uppercase">Zusatzeinkommen</span>
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-black opacity-20">CHF</span>
                                <input type="number" id="inc-extra" oninput="saveAndSync()" class="input-clean text-right w-28">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Section: Fixed -->
                <section class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Fixkosten</h3>
                        <span id="badge-fixed" class="px-3 py-1 bg-slate-100 text-[10px] font-black rounded-full">0</span>
                    </div>
                    <div id="list-fixed" class="space-y-3"></div>
                    <button onclick="addItem('fixed')" class="w-full mt-6 py-5 border-2 border-dashed border-slate-100 rounded-3xl text-[10px] font-black text-slate-400 uppercase tracking-widest hover:border-indigo-200 hover:text-indigo-400 transition-all">
                        + Fixkosten hinzufügen
                    </button>
                </section>

                <!-- Section: Variable -->
                <section class="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Variable Ausgaben</h3>
                        <span id="badge-variable" class="px-3 py-1 bg-slate-100 text-[10px] font-black rounded-full">0</span>
                    </div>
                    <div id="list-variable" class="space-y-3"></div>
                    <button onclick="addItem('variable')" class="w-full mt-6 py-5 border-2 border-dashed border-slate-100 rounded-3xl text-[10px] font-black text-slate-400 uppercase tracking-widest hover:border-indigo-200 hover:text-indigo-400 transition-all">
                        + Ausgabe hinzufügen
                    </button>
                </section>

                <button onclick="archiveMonth()" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">
                    Monat abschliessen & Archivieren
                </button>
            </div>

            <!-- Tab: Archive -->
            <div id="view-archive" class="hidden space-y-4 fade-in">
                <div id="archive-container" class="space-y-4">
                    <!-- Wird dynamisch gefüllt -->
                </div>
            </div>
        </main>
    </div>

    <!-- Loader & Overlay -->
    <div id="global-loader" class="hidden fixed inset-0 z-[200] bg-white/60 backdrop-blur-sm flex items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Initialisierung
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'budget-pro-v2';

        let appState = null;
        let syncTimeout = null;

        // Login Handler
        window.handleLogin = async () => {
            const code = document.getElementById('login-code').value;
            if(code.length < 4) return;
            
            const btn = document.getElementById('login-btn');
            btn.innerText = "Verbinde...";
            btn.disabled = true;

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                // Bei Erfolg Screen wechseln
                document.getElementById('login-screen').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-ui').classList.remove('hidden');
                    setTimeout(() => document.getElementById('app-ui').classList.add('opacity-100'), 50);
                }, 500);
            } catch (err) {
                console.error(err);
                btn.innerText = "Fehler - Neu versuchen";
                btn.disabled = false;
            }
        };

        // Auth Listener & Datenladen
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userId = user.uid;
                // Pfad: Kollektion(4) -> Dokument(5) -> Kollektion(6) -> Dokument(7) [VORSICHT: Firebase Regeln beachten]
                // Wir nutzen: artifacts/{appId}/users/{userId}/settings/currentData
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'settings', 'currentData');
                
                try {
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        appState = snap.data();
                    } else {
                        // Standarddaten
                        appState = {
                            income: { main: 5500, extra: 0 },
                            fixed: [
                                { name: 'Miete', amount: 2400 },
                                { name: 'Krankenkasse', amount: 450 }
                            ],
                            variable: []
                        };
                        await setDoc(docRef, appState);
                    }
                    renderAll();
                    setupArchiveListener(userId);
                    updateStatus("Bereit", "emerald");
                } catch (e) {
                    console.error("Data Load Error", e);
                    updateStatus("Datenfehler", "rose");
                }
            }
        });

        function updateStatus(text, color) {
            const dot = document.getElementById('sync-dot');
            const txt = document.getElementById('status-text');
            txt.innerText = text;
            dot.className = `w-1.5 h-1.5 rounded-full bg-${color}-500 shadow-[0_0_8px_rgba(var(--tw-color-${color}-500))]`;
        }

        window.saveAndSync = () => {
            if (!appState || !auth.currentUser) return;
            
            // UI Werte in State schreiben
            appState.income.main = parseFloat(document.getElementById('inc-main').value) || 0;
            appState.income.extra = parseFloat(document.getElementById('inc-extra').value) || 0;
            
            updateCalculations();
            updateStatus("Speichert...", "amber");

            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'currentData');
                    await setDoc(docRef, appState);
                    updateStatus("Synchronisiert", "emerald");
                } catch (err) {
                    console.error(err);
                    updateStatus("Sync Fehler", "rose");
                }
            }, 1000);
        };

        function renderAll() {
            document.getElementById('inc-main').value = appState.income.main;
            document.getElementById('inc-extra').value = appState.income.extra;
            renderList('fixed');
            renderList('variable');
            updateCalculations();
        }

        function renderList(type) {
            const container = document.getElementById(`list-${type}`);
            const badge = document.getElementById(`badge-${type}`);
            const list = appState[type];
            container.innerHTML = '';
            badge.innerText = list.length;

            list.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-3 p-4 bg-slate-50 rounded-2xl group transition-all hover:bg-slate-100";
                div.innerHTML = `
                    <input type="text" value="${item.name}" onchange="updateItem('${type}', ${idx}, 'name', this.value)" 
                           placeholder="Bezeichnung..." class="bg-transparent text-xs font-bold outline-none flex-grow">
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-black opacity-20">CHF</span>
                        <input type="number" value="${item.amount}" oninput="updateItem('${type}', ${idx}, 'amount', this.value)" 
                               class="bg-transparent text-right w-20 font-black outline-none text-xs">
                        <button onclick="removeItem('${type}', ${idx})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.addItem = (type) => {
            appState[type].push({ name: '', amount: 0 });
            renderList(type);
            saveAndSync();
        };

        window.updateItem = (type, idx, key, val) => {
            appState[type][idx][key] = key === 'amount' ? parseFloat(val) || 0 : val;
            saveAndSync();
        };

        window.removeItem = (type, idx) => {
            appState[type].splice(idx, 1);
            renderList(type);
            saveAndSync();
        };

        function updateCalculations() {
            const inc = (appState.income.main || 0) + (appState.income.extra || 0);
            const expFixed = appState.fixed.reduce((a, b) => a + (b.amount || 0), 0);
            const expVari = appState.variable.reduce((a, b) => a + (b.amount || 0), 0);
            const totalExp = expFixed + expVari;
            const diff = inc - totalExp;

            const format = (v) => new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(v);
            
            document.getElementById('display-inc').innerText = format(inc);
            document.getElementById('display-exp').innerText = format(totalExp);
            document.getElementById('display-saved').innerText = format(diff);
            
            const savedDisplay = document.getElementById('display-saved');
            savedDisplay.className = `text-5xl font-black mb-10 tracking-tighter ${diff < 0 ? 'text-rose-400' : 'text-white'}`;
        }

        window.switchTab = (tab) => {
            document.getElementById('view-planner').classList.toggle('hidden', tab !== 'planner');
            document.getElementById('view-archive').classList.toggle('hidden', tab !== 'archive');
            document.getElementById('nav-planner').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'planner' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('nav-archive').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'archive' ? 'tab-active' : 'text-slate-400'}`;
        };

        // Archiv-Logik
        window.archiveMonth = async () => {
            if (!auth.currentUser || !confirm("Möchtest du diesen Monat wirklich archivieren?")) return;
            
            document.getElementById('global-loader').classList.remove('hidden');
            const monthLabel = new Intl.DateTimeFormat('de-CH', { month: 'long', year: 'numeric' }).format(new Date());
            
            const archiveData = {
                dateLabel: monthLabel,
                timestamp: Date.now(),
                data: JSON.parse(JSON.stringify(appState)),
                summary: {
                    income: (appState.income.main || 0) + (appState.income.extra || 0),
                    expenses: appState.fixed.reduce((a,b)=>a+b.amount,0) + appState.variable.reduce((a,b)=>a+b.amount,0)
                }
            };

            try {
                // Archiv-Pfad: artifacts/{appId}/users/{userId}/archive/{timestamp}
                const archId = `idx_${Date.now()}`;
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'archive', archId), archiveData);
                
                // Variable Kosten zurücksetzen
                appState.variable = [];
                await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'currentData'), appState);
                
                renderAll();
                switchTab('archive');
            } catch (err) {
                console.error(err);
                alert("Archivierungsfehler!");
            } finally {
                document.getElementById('global-loader').classList.add('hidden');
            }
        };

        function setupArchiveListener(uid) {
            const colRef = collection(db, 'artifacts', appId, 'users', uid, 'archive');
            onSnapshot(colRef, (snap) => {
                const list = snap.docs.map(d => ({...d.data(), id: d.id}));
                renderArchiveUI(list);
            });
        }

        function renderArchiveUI(items) {
            const container = document.getElementById('archive-container');
            container.innerHTML = items.length ? '' : '<div class="py-20 text-center text-[10px] font-black text-slate-300 uppercase tracking-widest">Keine archivierten Monate</div>';
            
            items.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const diff = item.summary.income - item.summary.expenses;
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex justify-between items-center group hover:border-indigo-200 transition-all";
                div.innerHTML = `
                    <div>
                        <p class="text-[9px] font-black text-indigo-600 uppercase mb-1 tracking-widest">${item.dateLabel}</p>
                        <p class="text-xl font-black ${diff < 0 ? 'text-rose-500' : 'text-slate-800'}">
                            ${new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(diff)}
                        </p>
                    </div>
                    <button onclick="deleteFromArchive('${item.id}')" class="p-4 text-slate-200 hover:text-rose-500 transition-colors">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        window.deleteFromArchive = async (id) => {
            if (!auth.currentUser || !confirm("Diesen Monat endgültig aus dem Archiv löschen?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'archive', id));
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
