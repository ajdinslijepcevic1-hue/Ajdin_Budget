<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanSmart AI - Tourenplaner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs via klassischen Script-Tags (Compat Modus für Browser-Stabilität) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Firebase Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyBm0bf5BE_2S_WadPGu_Du1PsukMD7HyqI",
            authDomain: "termine-gza.firebaseapp.com",
            projectId: "termine-gza",
            storageBucket: "termine-gza.firebasestorage.app",
            messagingSenderId: "30574428671",
            appId: "1:30574428671:web:498a2c5aa1b417700927ca"
        };

        // Firebase Initialisierung
        const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "termine-gza-app";

        // Icons Helper
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [drawers, setDrawers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newOrder, setNewOrder] = useState({
                project: '',
                drawerId: '',
                elements: 0,
                docReceived: new Date().toISOString().split('T')[0],
                gzaDeadline: '',
                deliveryDate: ''
            });

            // Auth & Data Listeners
            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                const unsubscribeAuth = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const ordersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders');
                const drawersRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('drawers');

                const unsubOrders = ordersRef.onSnapshot(s => {
                    setOrders(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                const unsubDrawers = drawersRef.onSnapshot(s => {
                    setDrawers(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubOrders(); unsubDrawers(); };
            }, [user]);

            const addBusinessDays = (startDate, days) => {
                let date = new Date(startDate);
                let addedDays = 0;
                while (addedDays < days) {
                    date.setDate(date.getDate() + 1);
                    if (date.getDay() !== 0 && date.getDay() !== 6) addedDays++;
                }
                return date.toISOString().split('T')[0];
            };

            useEffect(() => {
                if (newOrder.docReceived) {
                    setNewOrder(prev => ({ ...prev, gzaDeadline: addBusinessDays(newOrder.docReceived, 10) }));
                }
            }, [newOrder.docReceived]);

            const prioritizedOrders = useMemo(() => {
                return [...orders].sort((a, b) => {
                    const score = (o) => {
                        const d = new Date(o.gzaReceived ? o.deliveryDate : o.gzaDeadline);
                        return 5000 - ((d - new Date()) / 86400000 * 100);
                    };
                    return score(b) - score(a);
                });
            }, [orders]);

            if (!user || (loading && orders.length === 0)) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="mt-4 font-bold text-slate-600">Verbindung zu PlanSmart AI...</p>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-white flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                            <div className="bg-blue-600 p-2 rounded-xl shadow-lg"><Icon name="bar-chart-3" /></div>
                            <span className="text-xl font-bold tracking-tight">PlanSmart AI</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 mt-4">
                            <SidebarLink active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout-dashboard" label="Dashboard" />
                            <SidebarLink active={activeTab === 'drawers'} onClick={() => setActiveTab('drawers')} icon="users" label="Team" />
                            <SidebarLink active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} icon="settings" label="Einstellungen" />
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <div className="bg-slate-800/50 p-4 rounded-xl text-[10px] text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                Live-Cloud Aktiv
                            </div>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar flex flex-col">
                        <header className="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-10">
                            <h2 className="text-xl font-bold text-slate-800">
                                {activeTab === 'dashboard' ? 'Zentrale Übersicht' : activeTab === 'settings' ? 'System-Stamm' : 'Team-Verwaltung'}
                            </h2>
                            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-semibold transition-all shadow-lg active:scale-95">
                                <Icon name="plus" /> Neuer Auftrag
                            </button>
                        </header>

                        <div className="p-8">
                            {activeTab === 'dashboard' && (
                                <>
                                    {/* Statistik-Karten */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                        <StatCard icon="clipboard-list" color="text-blue-600" label="Offene GZAs" value={orders.filter(o => !o.gzaReceived).length} />
                                        <StatCard icon="check-circle-2" color="text-emerald-500" label="GZA erhalten" value={orders.filter(o => o.gzaReceived).length} />
                                        <StatCard icon="alert-triangle" color="text-amber-500" label="Fristen" value={orders.filter(o => !o.gzaReceived).length} alert />
                                        <StatCard icon="trending-up" color="text-indigo-600" label="Auslastung" value={`${drawers.length > 0 ? 'Aktiv' : '0'}`} />
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        {/* Hauptliste */}
                                        <div className="lg:col-span-2">
                                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                                    <h3 className="font-bold flex items-center gap-2 text-slate-800"><Icon name="chevron-right" className="text-blue-600" /> Priorisierte Liste (KI-Vorschlag)</h3>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left">
                                                        <thead className="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest border-b border-slate-100">
                                                            <tr>
                                                                <th className="px-6 py-4">Rang</th>
                                                                <th className="px-6 py-4">Projekt & Zeichner</th>
                                                                <th className="px-6 py-4">Frist/Termin</th>
                                                                <th className="px-6 py-4 text-center">GZA Status</th>
                                                                <th className="px-6 py-4 text-center">Aktionen</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {prioritizedOrders.map((order, idx) => {
                                                                const isCritical = !order.gzaReceived && (new Date(order.gzaDeadline) - new Date()) / 86400000 < 3;
                                                                return (
                                                                    <tr key={order.id} className="group hover:bg-slate-50 transition-all">
                                                                        <td className="px-6 py-4 w-16">
                                                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm ${idx === 0 ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-500'}`}>{idx + 1}</div>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <p className="font-bold text-slate-800">{order.project}</p>
                                                                            <p className="text-xs text-slate-400 font-medium">
                                                                                {order.elements} Elem. · {drawers.find(d => d.id === order.drawerId)?.name || 'N/A'}
                                                                            </p>
                                                                        </td>
                                                                        <td className="px-6 py-4">
                                                                            <span className={`text-sm font-bold ${isCritical ? 'text-red-600' : 'text-slate-600'}`}>{order.gzaDeadline}</span>
                                                                        </td>
                                                                        <td className="px-6 py-4 text-center">
                                                                            <button 
                                                                                onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(order.id).update({ gzaReceived: !order.gzaReceived })}
                                                                                className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider border transition-all ${order.gzaReceived ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-slate-50 text-slate-400 border-slate-100 hover:border-blue-300 hover:text-blue-600'}`}
                                                                            >
                                                                                {order.gzaReceived ? 'GZA OK' : 'Ausstehend'}
                                                                            </button>
                                                                        </td>
                                                                        <td className="px-6 py-4 text-center">
                                                                            <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(order.id).delete()} className="p-2 text-slate-300 hover:text-red-500 transition-all">
                                                                                <Icon name="trash-2" size={18} />
                                                                            </button>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                            {prioritizedOrders.length === 0 && (
                                                                <tr><td colSpan="5" className="px-6 py-12 text-center text-slate-400 italic">Keine Aufträge vorhanden</td></tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Team-Widget */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 h-fit">
                                            <h3 className="font-bold mb-5 flex items-center gap-2 text-slate-800"><Icon name="users" className="text-blue-600" /> Auslastung</h3>
                                            <div className="space-y-6">
                                                {drawers.map(d => {
                                                    const total = orders.filter(o => o.drawerId === d.id).reduce((a, b) => a + (parseInt(b.elements) || 0), 0);
                                                    const perc = Math.min(100, (total / (parseInt(d.capacity) * 5 || 100)) * 100);
                                                    return (
                                                        <div key={d.id}>
                                                            <div className="flex justify-between text-xs mb-2 font-bold text-slate-700">
                                                                <span>{d.name}</span>
                                                                <span className="text-slate-400 font-medium">{total} Elem.</span>
                                                            </div>
                                                            <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                                                <div className={`h-full transition-all duration-700 ${perc > 90 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${perc}%` }}></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}

                            {activeTab === 'drawers' && (
                                <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tight">Team-Verwaltung</h3>
                                        <button 
                                            onClick={() => {
                                                const id = Date.now().toString();
                                                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('drawers').doc(id).set({ name: 'Neuer Zeichner', capacity: 40 });
                                            }}
                                            className="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg"
                                        >
                                            <Icon name="plus" size={18} /> Zeichner hinzufügen
                                        </button>
                                    </div>
                                    <div className="space-y-4">
                                        {drawers.map(d => (
                                            <div key={d.id} className="flex items-center gap-4 p-5 rounded-2xl border border-slate-100 bg-slate-50/50">
                                                <input className="flex-1 px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:border-blue-400" value={d.name} onChange={(e) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('drawers').doc(d.id).update({ name: e.target.value })} />
                                                <div className="flex items-center gap-2">
                                                    <input type="number" className="w-20 px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-blue-600" value={d.capacity} onChange={(e) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('drawers').doc(d.id).update({ capacity: e.target.value })} />
                                                    <span className="text-[10px] font-black text-slate-400 uppercase">E/Tag</span>
                                                </div>
                                                <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('drawers').doc(d.id).delete()} className="p-3 text-slate-300 hover:text-red-500 transition-all"><Icon name="trash-2" /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xl shadow-2xl p-8 animate-in zoom-in duration-300">
                                <h3 className="text-2xl font-black mb-6 tracking-tight text-slate-800">Auftrag anlegen</h3>
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2">Projektname</label>
                                        <input required className="w-full px-4 py-3 bg-slate-100 rounded-2xl outline-none font-bold text-slate-800 focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all" onChange={e => setNewOrder({...newOrder, project: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2">Zeichner</label>
                                            <select className="w-full px-4 py-3 bg-slate-100 rounded-2xl font-bold" onChange={e => setNewOrder({...newOrder, drawerId: e.target.value})}>
                                                <option value="">Wählen...</option>
                                                {drawers.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2">Anzahl Elemente</label>
                                            <input type="number" className="w-full px-4 py-3 bg-slate-100 rounded-2xl font-bold" onChange={e => setNewOrder({...newOrder, elements: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase text-slate-400 mb-2">Unterlagen erhalten am</label>
                                        <input type="date" className="w-full px-4 py-3 bg-slate-100 rounded-2xl font-bold" value={newOrder.docReceived} onChange={e => setNewOrder({...newOrder, docReceived: e.target.value})} />
                                    </div>
                                    <div className="p-4 bg-blue-50 rounded-2xl text-xs font-bold text-blue-700 flex justify-between border border-blue-100">
                                        <span className="uppercase tracking-wide">GZA Frist (+10 AT):</span>
                                        <span>{newOrder.gzaDeadline || '--'}</span>
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600">Abbrechen</button>
                                        <button 
                                            onClick={async () => {
                                                if(!newOrder.project) return;
                                                const id = Date.now().toString();
                                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(id).set({...newOrder, gzaReceived: false, createdAt: new Date().toISOString()});
                                                setIsModalOpen(false);
                                            }}
                                            className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-600/30 hover:bg-blue-700"
                                        >Speichern</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SidebarLink = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                <Icon name={icon} size={20}/><span className="font-bold text-sm">{label}</span>
            </button>
        );

        const StatCard = ({ icon, color, label, value, alert }) => (
            <div className={`p-6 rounded-3xl border bg-white shadow-sm transition-all hover:shadow-md ${alert ? 'border-amber-200 bg-amber-50/20' : 'border-slate-200'}`}>
                <div className="flex items-center gap-4">
                    <div className={`p-3 rounded-2xl ${alert ? 'bg-amber-100' : 'bg-slate-50'}`}><Icon name={icon} className={color} /></div>
                    <div>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">{label}</p>
                        <p className="text-2xl font-black text-slate-900 leading-none">{value}</p>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
