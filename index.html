<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
        #auth-overlay { position: fixed; inset: 0; background: #4f46e5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Login Overlay -->
    <div id="auth-overlay">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center max-w-xs w-full mx-4">
            <h2 class="text-xl font-black text-indigo-600 uppercase mb-2 tracking-tighter">Budget Pro Login</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-8 uppercase tracking-widest">Sicherheits-Code</p>
            
            <div class="relative mb-8">
                <input type="text" id="access-code-input" 
                       class="w-full text-center text-3xl font-black tracking-[0.4em] border-b-4 border-slate-100 outline-none focus:border-indigo-600 py-3 transition-colors" 
                       maxlength="6" placeholder="••••••" autofocus>
            </div>

            <button onclick="checkAccessCode()" id="login-btn" 
                    class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] hover:bg-indigo-700 active:scale-95 transition-all shadow-xl shadow-indigo-200">
                Zugriff prüfen
            </button>
            
            <p id="auth-error" class="text-rose-500 text-[10px] font-black mt-6 uppercase hidden">Falscher Code</p>
        </div>
    </div>

    <!-- Beleg Modal -->
    <div id="receipt-modal" class="modal" onclick="closeModal()">
        <div class="max-w-4xl max-h-full bg-white p-2 rounded-2xl shadow-2xl relative" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="max-w-full max-h-[80vh] rounded-xl object-contain" alt="Beleg">
            <button onclick="closeModal()" class="w-full mt-4 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Schliessen</button>
        </div>
    </div>

    <!-- App Content -->
    <div id="app-container" class="hidden">
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-indigo-600 uppercase">BUDGET PRO</h1>
                <p id="status-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Initialisierung...</p>
            </div>
            <button onclick="window.print()" class="p-2.5 bg-slate-100 rounded-xl text-slate-600 hover:bg-slate-200">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
        </header>

        <nav class="flex justify-center border-b border-slate-200 bg-white sticky top-[69px] z-40">
            <button id="tab-planner" onclick="switchTab('planner')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] tab-active">Planer</button>
            <button id="tab-archive" onclick="switchTab('archive')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Archiv</button>
        </nav>

        <main id="app-content" class="max-w-2xl mx-auto p-4 space-y-6 pb-24">
            <!-- PLANNER VIEW -->
            <div id="view-planner" class="space-y-6">
                <!-- Dashboard -->
                <div class="bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-2xl shadow-indigo-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Restbudget</p>
                        <h2 id="display-saved" class="text-4xl font-black mb-6 tracking-tight">CHF 0.00</h2>
                        <div class="grid grid-cols-2 gap-6 pt-6 border-t border-white/20">
                            <div>
                                <p class="text-[10px] uppercase font-bold opacity-50 mb-1">Einnahmen</p>
                                <p id="display-inc" class="font-black text-sm">CHF 0.00</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase font-bold opacity-50 mb-1">Ausgaben</p>
                                <p id="display-exp" class="font-black text-sm">CHF 0.00</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Einnahmen -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Einnahmen</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                            <span class="text-xs font-bold text-slate-500">Hauptlohn</span>
                            <div class="flex items-center gap-1">
                                <span class="text-[10px] font-bold opacity-20">CHF</span>
                                <input type="number" id="inc-me" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                            </div>
                        </div>
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                            <span class="text-xs font-bold text-slate-500">Zusatz / Partner</span>
                            <div class="flex items-center gap-1">
                                <span class="text-[10px] font-bold opacity-20">CHF</span>
                                <input type="number" id="inc-spouse" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Fixkosten -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Fixkosten</h3>
                    <div id="fixed-costs-container" class="space-y-3"></div>
                    <button onclick="addRow('fixed')" class="w-full mt-6 py-4 border-2 border-dashed border-slate-100 rounded-2xl text-[10px] font-black text-slate-300 uppercase tracking-widest hover:bg-slate-50 transition-colors">
                        + Zeile hinzufügen
                    </button>
                </section>

                <!-- Variable Kosten -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Variable Kosten</h3>
                    <div id="variable-costs-container" class="space-y-3"></div>
                    <button onclick="addRow('variable')" class="w-full mt-6 py-4 border-2 border-dashed border-slate-100 rounded-2xl text-[10px] font-black text-slate-300 uppercase tracking-widest hover:bg-slate-50 transition-colors">
                        + Ausgabe hinzufügen
                    </button>
                </section>

                <button onclick="archiveCurrentMonth()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:bg-black active:scale-95 transition-all">
                    Monat abschliessen
                </button>
            </div>

            <!-- ARCHIVE VIEW -->
            <div id="view-archive" class="hidden space-y-4">
                <div id="archive-list" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'budget-pro-v2';

        let state = null;
        let archive = [];
        let saveTimeout = null;

        const defaultState = {
            income: { me: 5500, spouse: 0 },
            fixedCosts: [
                { name: 'Miete', amount: 2402, receipt: null },
                { name: 'Auto', amount: 665, receipt: null },
                { name: 'swisscom', amount: 179.80, receipt: null },
                { name: 'Spende', amount: 10, receipt: null },
                { name: 'Diganti', amount: 400, receipt: null },
                { name: 'Lebensmittel', amount: 1500, receipt: null },
                { name: 'Ajdin', amount: 350, receipt: null },
                { name: '3. Säule', amount: 300, receipt: null },
                { name: 'Krankenkasse Ajdin', amount: 165.45, receipt: null },
                { name: 'Krankenkasse Elma', amount: 369.05, receipt: null },
                { name: 'MediaMarkt', amount: 60, receipt: null },
                { name: 'Leistungsabrechnung CSS', amount: 0, receipt: null },
                { name: 'Steuer', amount: 99.60, receipt: null }
            ],
            variableCosts: []
        };

        // Sofortiger Check ohne Cloud-Warten
        window.checkAccessCode = () => {
            const input = document.getElementById('access-code-input').value;
            const error = document.getElementById('auth-error');
            
            if (input === '160123') {
                // ERFOLG: Sofortiges Freischalten der UI
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');
                
                // Jetzt erst Cloud-Init im Hintergrund
                initCloud();
            } else {
                error.classList.remove('hidden');
                document.getElementById('access-code-input').value = '';
            }
        };

        // Enter-Taste für Login
        document.getElementById('access-code-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAccessCode();
        });

        async function initCloud() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        await loadUserData(user.uid);
                        startArchiveListener(user.uid);
                    }
                });
            } catch (e) {
                console.error("Cloud-Init Fehler", e);
                // Fallback: Mit Standarddaten arbeiten falls Cloud blockiert
                state = JSON.parse(JSON.stringify(defaultState));
                renderPlanner();
                document.getElementById('status-text').innerText = "Offline-Modus";
            }
        }

        async function loadUserData(uid) {
            const docRef = doc(db, 'artifacts', appId, 'users', uid, 'planner', 'current');
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                state = snap.data();
            } else {
                state = JSON.parse(JSON.stringify(defaultState));
                await setDoc(docRef, state);
            }
            renderPlanner();
            document.getElementById('status-text').innerText = "Cloud Synchronisiert";
        }

        function startArchiveListener(uid) {
            const colRef = collection(db, 'artifacts', appId, 'users', uid, 'archive');
            onSnapshot(colRef, (snap) => {
                archive = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                if (!document.getElementById('view-archive').classList.contains('hidden')) renderArchive();
            });
        }

        window.debouncedSave = () => {
            updateCalculations();
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                if (auth.currentUser && state) {
                    const uid = auth.currentUser.uid;
                    state.income.me = parseFloat(document.getElementById('inc-me').value) || 0;
                    state.income.spouse = parseFloat(document.getElementById('inc-spouse').value) || 0;
                    setDoc(doc(db, 'artifacts', appId, 'users', uid, 'planner', 'current'), state);
                    document.getElementById('status-text').innerText = "Gespeichert " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }, 1500);
        };

        function renderPlanner() {
            if (!state) return;
            document.getElementById('inc-me').value = state.income.me;
            document.getElementById('inc-spouse').value = state.income.spouse;

            const fixedCont = document.getElementById('fixed-costs-container');
            fixedCont.innerHTML = '';
            state.fixedCosts.forEach((item, i) => fixedCont.appendChild(createRow(item, i, 'fixed')));

            const variCont = document.getElementById('variable-costs-container');
            variCont.innerHTML = '';
            state.variableCosts.forEach((item, i) => variCont.appendChild(createRow(item, i, 'variable')));

            updateCalculations();
        }

        function createRow(item, index, type) {
            const div = document.createElement('div');
            div.className = 'flex flex-col p-4 bg-slate-50 rounded-2xl border border-slate-100 group';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <input type="text" value="${item.name}" onchange="updateRow('${type}', ${index}, 'name', this.value)" 
                           class="bg-transparent text-xs font-bold outline-none flex-grow placeholder-slate-300" placeholder="Bezeichnung">
                    <div class="flex items-center gap-1 font-black">
                        <span class="text-[10px] opacity-20 uppercase">CHF</span>
                        <input type="number" value="${item.amount}" oninput="updateRow('${type}', ${index}, 'amount', this.value)" 
                               class="bg-transparent text-right w-20 outline-none text-xs">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex gap-4">
                        <label class="cursor-pointer flex items-center gap-2 group/btn">
                            <input type="file" class="hidden" onchange="uploadReceipt(event, '${type}', ${index})">
                            <div class="w-7 h-7 rounded-lg bg-white border border-slate-200 flex items-center justify-center group-hover/btn:border-indigo-400 transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${item.receipt ? '#10b981' : '#64748b'}" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            </div>
                            <span class="text-[9px] font-black uppercase tracking-tighter ${item.receipt ? 'text-emerald-500' : 'text-slate-400'}">${item.receipt ? 'Beleg OK' : 'Beleg Scan'}</span>
                        </label>
                        ${item.receipt ? `
                            <button onclick="openModal('${item.receipt}')" class="text-indigo-600 font-black text-[9px] uppercase tracking-tighter underline">Ansehen</button>
                        ` : ''}
                    </div>
                    <button onclick="removeRow('${type}', ${index})" class="opacity-0 group-hover:opacity-100 transition-opacity p-2 text-slate-300 hover:text-rose-500">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            `;
            return div;
        }

        window.updateRow = (type, index, key, value) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list[index][key] = key === 'amount' ? parseFloat(value) || 0 : value;
            debouncedSave();
        };

        window.addRow = (type) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.push({ name: '', amount: 0, receipt: null });
            renderPlanner();
            debouncedSave();
        };

        window.removeRow = (type, index) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.splice(index, 1);
            renderPlanner();
            debouncedSave();
        };

        function updateCalculations() {
            if (!state) return;
            const incMe = parseFloat(document.getElementById('inc-me').value) || 0;
            const incSp = parseFloat(document.getElementById('inc-spouse').value) || 0;
            const totalInc = incMe + incSp;
            const totalFixed = state.fixedCosts.reduce((s, i) => s + (i.amount || 0), 0);
            const totalVari = state.variableCosts.reduce((s, i) => s + (i.amount || 0), 0);
            const totalExp = totalFixed + totalVari;

            const f = (v) => new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(v);
            document.getElementById('display-inc').innerText = f(totalInc);
            document.getElementById('display-exp').innerText = f(totalExp);
            document.getElementById('display-saved').innerText = f(totalInc - totalExp);
        }

        window.switchTab = (tab) => {
            document.getElementById('view-planner').classList.toggle('hidden', tab !== 'planner');
            document.getElementById('view-archive').classList.toggle('hidden', tab !== 'archive');
            document.getElementById('tab-planner').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'planner' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('tab-archive').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'archive' ? 'tab-active' : 'text-slate-400'}`;
            if (tab === 'archive') renderArchive();
        };

        window.archiveCurrentMonth = async () => {
            if (!confirm("Monat wirklich abschliessen und archivieren?") || !auth.currentUser) return;
            const month = new Intl.DateTimeFormat('de-CH', { month: 'long', year: 'numeric' }).format(new Date());
            const inc = (parseFloat(document.getElementById('inc-me').value) || 0) + (parseFloat(document.getElementById('inc-spouse').value) || 0);
            const exp = state.fixedCosts.reduce((s,i)=>s+i.amount,0) + state.variableCosts.reduce((s,i)=>s+i.amount,0);
            
            const archData = {
                ...state,
                month,
                totals: { inc, exp, saved: inc - exp },
                timestamp: Date.now()
            };

            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'archive', "m_" + Date.now()), archData);
            state.variableCosts = []; // Nur variable Kosten leeren
            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'planner', 'current'), state);
            alert("Erfolgreich archiviert!");
            renderPlanner();
            switchTab('archive');
        };

        function renderArchive() {
            const cont = document.getElementById('archive-list');
            cont.innerHTML = '';
            if (archive.length === 0) {
                cont.innerHTML = `<div class="text-center py-20 text-slate-300 text-[10px] font-black uppercase tracking-widest">Keine Einträge im Archiv</div>`;
                return;
            }
            archive.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <p class="text-[9px] font-black text-indigo-600 uppercase mb-1">${item.month}</p>
                        <p class="text-xl font-black">${new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(item.totals.saved)}</p>
                    </div>
                    <button onclick="deleteArchive('${item.id}')" class="p-3 text-slate-200 hover:text-rose-500">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                `;
                cont.appendChild(div);
            });
        }

        window.deleteArchive = async (id) => {
            if (confirm("Eintrag unwiderruflich löschen?") && auth.currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'archive', id));
            }
        };

        window.uploadReceipt = (e, type, index) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
                list[index].receipt = event.target.result;
                renderPlanner();
                debouncedSave();
            };
            reader.readAsDataURL(file);
        };

        window.openModal = (src) => {
            document.getElementById('modal-img').src = src;
            document.getElementById('receipt-modal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('receipt-modal').classList.remove('active');
    </script>
</body>
</html>
