<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Live Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app-container">
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-indigo-600 uppercase">BUDGET PRO</h1>
                <p id="status-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Verbinde mit Cloud...</p>
            </div>
            <button onclick="window.print()" class="p-2 bg-slate-100 rounded-xl text-slate-400">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
        </header>

        <nav class="flex justify-center border-b border-slate-200 bg-white sticky top-[69px] z-40">
            <button id="tab-planner" onclick="switchTab('planner')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] tab-active">Planer</button>
            <button id="tab-archive" onclick="switchTab('archive')" class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Archiv</button>
        </nav>

        <main class="max-w-2xl mx-auto p-4 space-y-6 pb-24">
            <div id="view-planner" class="space-y-6">
                <!-- Dashboard -->
                <div class="bg-indigo-600 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                    <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Restbudget</p>
                    <h2 id="display-saved" class="text-4xl font-black mb-6 tracking-tight">CHF 0.00</h2>
                    <div class="grid grid-cols-2 gap-6 pt-6 border-t border-white/20">
                        <div>
                            <p class="text-[10px] uppercase font-bold opacity-50 mb-1">Einnahmen</p>
                            <p id="display-inc" class="font-black text-sm">CHF 0.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase font-bold opacity-50 mb-1">Ausgaben</p>
                            <p id="display-exp" class="font-black text-sm">CHF 0.00</p>
                        </div>
                    </div>
                </div>

                <!-- Einnahmen -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Einnahmen</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                            <span class="text-xs font-bold text-slate-500">Lohn</span>
                            <input type="number" id="inc-me" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                        </div>
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                            <span class="text-xs font-bold text-slate-500">Zusatz</span>
                            <input type="number" id="inc-spouse" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                        </div>
                    </div>
                </section>

                <!-- Fixkosten -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Fixkosten</h3>
                    <div id="fixed-costs-container" class="space-y-3"></div>
                    <button onclick="addRow('fixed')" class="w-full mt-6 py-4 border-2 border-dashed border-slate-100 rounded-2xl text-[10px] font-black text-slate-300 uppercase tracking-widest hover:bg-slate-50 transition-all">
                        + Fixkosten hinzufügen
                    </button>
                </section>

                <!-- Variable Kosten -->
                <section class="bg-white rounded-[2rem] p-6 border border-slate-200 shadow-sm">
                    <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Variable Kosten</h3>
                    <div id="variable-costs-container" class="space-y-3"></div>
                    <button onclick="addRow('variable')" class="w-full mt-6 py-4 border-2 border-dashed border-slate-100 rounded-2xl text-[10px] font-black text-slate-300 uppercase tracking-widest hover:bg-slate-50 transition-all">
                        + Ausgabe hinzufügen
                    </button>
                </section>

                <button onclick="archiveCurrentMonth()" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:bg-black active:scale-95 transition-all">
                    Monat archivieren
                </button>
            </div>

            <div id="view-archive" class="hidden space-y-4">
                <div id="archive-list" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="receipt-modal" class="modal" onclick="closeModal()">
        <div class="max-w-4xl max-h-full bg-white p-2 rounded-2xl shadow-2xl relative" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="max-w-full max-h-[80vh] rounded-xl object-contain" alt="Beleg">
            <button onclick="closeModal()" class="w-full mt-4 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Schliessen</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'budget-pro-live-v1';

        let state = null;
        let saveTimeout = null;

        const defaultState = {
            income: { me: 5500, spouse: 0 },
            fixedCosts: [
                { name: 'Miete', amount: 2402, receipt: null },
                { name: 'Auto', amount: 665, receipt: null },
                { name: 'Swisscom', amount: 179.80, receipt: null }
            ],
            variableCosts: [
                { name: 'Lebensmittel', amount: 1500, receipt: null }
            ]
        };

        // Authentifizierung und Start
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error", error);
                document.getElementById('status-text').innerText = "Auth-Fehler";
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // FIXED: Pfade muessen eine gerade Anzahl an Segmenten haben
                // Kollektion: artifacts / {appId} / public / data / planner_entries / {user.uid}
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'planner_entries', user.uid);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    state = snap.data();
                    if (!state.fixedCosts) state.fixedCosts = [];
                    if (!state.variableCosts) state.variableCosts = [];
                    if (!state.income) state.income = { me: 0, spouse: 0 };
                } else {
                    state = JSON.parse(JSON.stringify(defaultState));
                    await setDoc(docRef, state);
                }
                
                renderPlanner();
                startArchiveListener(user.uid);
                document.getElementById('status-text').innerText = "Live Synchronisiert";
                document.getElementById('status-text').classList.replace('text-slate-400', 'text-emerald-500');
            }
        });

        initAuth();

        function startArchiveListener(uid) {
            // FIXED: Struktur fuer Archiv angepasst
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'archive_' + uid);
            onSnapshot(colRef, (snap) => {
                const archive = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                renderArchive(archive);
            }, (err) => {
                console.error("Archive Listen Error", err);
            });
        }

        window.debouncedSave = () => {
            updateCalculations();
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                if (!auth.currentUser || !state) return;
                
                state.income.me = parseFloat(document.getElementById('inc-me').value) || 0;
                state.income.spouse = parseFloat(document.getElementById('inc-spouse').value) || 0;
                
                try {
                    // FIXED: Pfad korrigiert
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'planner_entries', auth.currentUser.uid);
                    await setDoc(docRef, state);
                    document.getElementById('status-text').innerText = "Gespeichert " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                } catch(e) {
                    console.error("Save Error", e);
                    document.getElementById('status-text').innerText = "Speicherfehler";
                }
            }, 800);
        };

        function renderPlanner() {
            if (!state) return;
            document.getElementById('inc-me').value = state.income.me;
            document.getElementById('inc-spouse').value = state.income.spouse;

            renderRowList('fixed-costs-container', state.fixedCosts, 'fixed');
            renderRowList('variable-costs-container', state.variableCosts, 'variable');
            
            updateCalculations();
        }

        function renderRowList(containerId, list, type) {
            const cont = document.getElementById(containerId);
            cont.innerHTML = '';
            list.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'p-4 bg-slate-50 rounded-2xl border border-slate-100 space-y-3 group';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <input type="text" value="${item.name || ''}" onchange="updateItem('${type}', ${i}, 'name', this.value)" 
                               class="bg-transparent font-bold text-xs outline-none flex-grow" placeholder="Bezeichnung">
                        <div class="flex items-center gap-1 font-black text-xs">
                            <span class="opacity-20 uppercase">CHF</span>
                            <input type="number" value="${item.amount || 0}" oninput="updateItem('${type}', ${i}, 'amount', this.value)" 
                                   class="bg-transparent text-right w-20 outline-none">
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="cursor-pointer flex items-center gap-2">
                            <input type="file" class="hidden" onchange="uploadFile(event, '${type}', ${i})">
                            <div class="w-8 h-8 rounded-lg bg-white border border-slate-200 flex items-center justify-center group-hover:border-indigo-300 transition-colors">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${item.receipt ? '#10b981' : '#64748b'}" stroke-width="3"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            </div>
                            <span class="text-[9px] font-black uppercase ${item.receipt ? 'text-emerald-500' : 'text-slate-400'}">${item.receipt ? 'Beleg OK' : 'Scan'}</span>
                        </label>
                        <div class="flex gap-3">
                            ${item.receipt ? `<button onclick="openModal('${item.receipt}')" class="text-indigo-600 font-black text-[9px] uppercase tracking-tighter underline">Vorschau</button>` : ''}
                            <button onclick="removeRow('${type}', ${i})" class="text-slate-300 hover:text-rose-500 transition-colors">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>
                `;
                cont.appendChild(div);
            });
        }

        window.updateItem = (type, i, key, val) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list[i][key] = key === 'amount' ? parseFloat(val) || 0 : val;
            debouncedSave();
        };

        window.addRow = (type) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.push({ name: '', amount: 0, receipt: null });
            renderPlanner();
            debouncedSave();
        };

        window.removeRow = (type, i) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.splice(i, 1);
            renderPlanner();
            debouncedSave();
        };

        window.uploadFile = (e, type, i) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
                list[i].receipt = event.target.result;
                renderPlanner();
                debouncedSave();
            };
            reader.readAsDataURL(file);
        };

        function updateCalculations() {
            const inc = (parseFloat(document.getElementById('inc-me').value) || 0) + (parseFloat(document.getElementById('inc-spouse').value) || 0);
            const totalFixed = (state.fixedCosts || []).reduce((s, i) => s + (i.amount || 0), 0);
            const totalVari = (state.variableCosts || []).reduce((s, i) => s + (i.amount || 0), 0);
            const exp = totalFixed + totalVari;
            const f = (v) => new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(v);
            
            document.getElementById('display-inc').innerText = f(inc);
            document.getElementById('display-exp').innerText = f(exp);
            document.getElementById('display-saved').innerText = f(inc - exp);
        }

        window.switchTab = (tab) => {
            document.getElementById('view-planner').classList.toggle('hidden', tab !== 'planner');
            document.getElementById('view-archive').classList.toggle('hidden', tab !== 'archive');
            document.getElementById('tab-planner').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'planner' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('tab-archive').className = `flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] ${tab === 'archive' ? 'tab-active' : 'text-slate-400'}`;
        };

        window.archiveCurrentMonth = async () => {
            if (!confirm("Monat archivieren?") || !auth.currentUser) return;
            const month = new Intl.DateTimeFormat('de-CH', { month: 'long', year: 'numeric' }).format(new Date());
            const inc = (state.income.me || 0) + (state.income.spouse || 0);
            const exp = (state.fixedCosts || []).reduce((s,i)=>s+(i.amount||0),0) + (state.variableCosts || []).reduce((s,i)=>s+(i.amount||0),0);
            
            const data = { ...state, month, timestamp: Date.now(), totals: { inc, exp, saved: inc - exp } };
            
            try {
                const archiveId = "m_" + Date.now();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'archive_' + auth.currentUser.uid, archiveId), data);
                
                state.variableCosts = []; 
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'planner_entries', auth.currentUser.uid);
                await setDoc(docRef, state);
                
                renderPlanner();
                switchTab('archive');
            } catch(e) { 
                console.error("Archive Error", e);
                alert("Fehler beim Archivieren!"); 
            }
        };

        function renderArchive(archive) {
            const cont = document.getElementById('archive-list');
            cont.innerHTML = archive.length ? '' : '<p class="text-center text-slate-300 py-20 uppercase text-[10px] font-black tracking-widest">Keine Einträge</p>';
            
            archive.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <p class="text-[9px] font-black text-indigo-600 uppercase mb-1 tracking-tighter">${item.month || 'Unbekannt'}</p>
                        <p class="text-xl font-black">${new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(item.totals?.saved || 0)}</p>
                    </div>
                    <button onclick="deleteArchive('${item.id}')" class="p-3 text-slate-200 hover:text-rose-500 transition-colors">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                `;
                cont.appendChild(div);
            });
        }

        window.deleteArchive = async (id) => {
            if (confirm("Löschen?") && auth.currentUser) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'archive_' + auth.currentUser.uid, id));
                } catch(e) {
                    console.error("Delete Error", e);
                }
            }
        };

        window.openModal = (src) => {
            document.getElementById('modal-img').src = src;
            document.getElementById('receipt-modal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('receipt-modal').classList.remove('active');
    </script>
</body>
</html>
