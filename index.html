<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none; } }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        #auth-overlay { position: fixed; inset: 0; background: #4f46e5; z-index: 2000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #auth-overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-24">

    <!-- Auth Overlay (Zugriffscode) -->
    <div id="auth-overlay">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl text-center max-w-xs w-full mx-4">
            <h2 class="text-xl font-black text-indigo-600 uppercase mb-4 tracking-tighter">Budget Pro Login</h2>
            <p class="text-xs text-slate-400 font-bold mb-6 uppercase">Code eingeben</p>
            <input type="password" id="access-code-input" class="w-full text-center text-2xl font-black tracking-[0.5em] border-b-2 border-indigo-100 outline-none focus:border-indigo-600 mb-6 py-2" maxlength="6">
            <button onclick="checkAccessCode()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-indigo-700 transition-all">Zugriff prüfen</button>
            <p id="auth-error" class="text-rose-500 text-[10px] font-bold mt-4 uppercase hidden">Falscher Code</p>
        </div>
    </div>

    <!-- Beleg Vorschau Modal -->
    <div id="receipt-modal" class="modal" onclick="closeModal()">
        <div class="max-w-4xl max-h-full bg-white p-2 rounded-lg shadow-2xl relative" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white font-bold uppercase text-xs tracking-widest">Schliessen [X]</button>
            <img id="modal-img" src="" class="max-w-full max-h-[85vh] rounded object-contain" alt="Beleg Vorschau">
        </div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center no-print">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-indigo-600 uppercase">BUDGET PRO</h1>
            <p id="status-text" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Cloud-Speicherung Aktiv</p>
        </div>
        <div class="flex gap-2">
            <button onclick="window.print()" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex justify-center border-b border-slate-200 bg-white no-print">
        <button id="tab-planner" onclick="switchTab('planner')" class="px-6 py-3 text-xs font-bold uppercase tracking-widest tab-active">Planer</button>
        <button id="tab-archive" onclick="switchTab('archive')" class="px-6 py-3 text-xs font-bold uppercase tracking-widest text-slate-400">Archiv</button>
    </div>

    <main id="app-content" class="max-w-2xl mx-auto p-4 space-y-6 opacity-0 transition-opacity duration-500">
        <!-- PLANNER VIEW -->
        <div id="view-planner" class="space-y-6">
            <!-- Dashboard -->
            <div class="bg-indigo-600 text-white p-8 rounded-[2rem] shadow-xl shadow-indigo-100 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest mb-1">Verfügbares Budget</p>
                    <h2 id="display-saved" class="text-4xl font-black mb-6">CHF 0.00</h2>
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/20">
                        <div>
                            <p class="text-[10px] uppercase font-bold opacity-60">Einnahmen</p>
                            <p id="display-inc" class="font-bold text-sm">CHF 0.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase font-bold opacity-60">Ausgaben</p>
                            <p id="display-exp" class="font-bold text-sm">CHF 0.00</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            </div>

            <!-- Einnahmen -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Einnahmen</h3>
                <div class="space-y-2">
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-500">Mein Lohn</span>
                        <input type="number" id="inc-me" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                    </div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-500">Partner / Sonstiges</span>
                        <input type="number" id="inc-spouse" oninput="debouncedSave()" class="bg-transparent text-right font-black w-24 outline-none">
                    </div>
                </div>
            </section>

            <!-- Fixkosten -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black uppercase text-slate-400">Fixkosten</h3>
                </div>
                <div id="fixed-costs-container" class="space-y-3"></div>
                <button onclick="addRow('fixed')" class="w-full mt-4 py-3 border-2 border-dashed border-slate-100 rounded-xl text-[10px] font-bold text-slate-400 uppercase hover:bg-slate-50">
                    + Zeile hinzufügen
                </button>
            </section>

            <!-- Variable Kosten -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Variable Ausgaben</h3>
                <div id="variable-costs-container" class="space-y-3"></div>
                <button onclick="addRow('variable')" class="w-full mt-4 py-3 border-2 border-dashed border-slate-100 rounded-xl text-[10px] font-bold text-slate-400 uppercase hover:bg-slate-50">
                    + Ausgabe hinzufügen
                </button>
            </section>

            <button onclick="archiveCurrentMonth()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest no-print shadow-lg hover:bg-black transition-all">
                Monat abschliessen & Archivieren
            </button>
        </div>

        <!-- ARCHIVE VIEW -->
        <div id="view-archive" class="hidden space-y-4">
            <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Archivierte Monate</h3>
            <div id="archive-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (Runtime bereitgestellt)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'budget-pro-app';

        // Globale App Variablen
        let state = null;
        let archive = [];
        let saveTimeout = null;

        const defaultState = {
            income: { me: 5500, spouse: 0 },
            fixedCosts: [
                { name: 'Miete', amount: 2402, receipt: null },
                { name: 'Auto', amount: 665, receipt: null },
                { name: 'swisscom', amount: 179.80, receipt: null },
                { name: 'Spende', amount: 10, receipt: null },
                { name: 'Diganti', amount: 400, receipt: null },
                { name: 'Lebensmittel', amount: 1500, receipt: null },
                { name: 'Ajdin', amount: 350, receipt: null },
                { name: '3. Säule', amount: 300, receipt: null },
                { name: 'Krankenkasse Ajdin', amount: 165.45, receipt: null },
                { name: 'Krankenkasse Elma', amount: 369.05, receipt: null },
                { name: 'MediaMarkt', amount: 60, receipt: null },
                { name: 'Steuer', amount: 99.60, receipt: null }
            ],
            variableCosts: []
        };

        // Zugriffscode Prüfung
        window.checkAccessCode = () => {
            const input = document.getElementById('access-code-input').value;
            const error = document.getElementById('auth-error');
            if (input === '160123') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-content').classList.remove('opacity-0');
                initApp();
            } else {
                error.classList.remove('hidden');
            }
        };

        async function initApp() {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    loadData(user.uid);
                    listenToArchive(user.uid);
                }
            });
        }

        async function loadData(uid) {
            const plannerRef = doc(db, 'artifacts', appId, 'users', uid, 'planner', 'current');
            const snap = await getDoc(plannerRef);
            if (snap.exists()) {
                state = snap.data();
            } else {
                state = JSON.parse(JSON.stringify(defaultState));
                await setDoc(plannerRef, state);
            }
            renderPlanner();
        }

        function listenToArchive(uid) {
            const archiveRef = collection(db, 'artifacts', appId, 'users', uid, 'archive');
            onSnapshot(archiveRef, (snap) => {
                archive = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                if (document.getElementById('view-archive').classList.contains('hidden') === false) {
                    renderArchive();
                }
            }, (err) => console.error(err));
        }

        window.debouncedSave = () => {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveToCloud(), 1000);
            updateCalculations();
        };

        async function saveToCloud() {
            if (!auth.currentUser || !state) return;
            const uid = auth.currentUser.uid;
            
            // UI Werte in State übertragen
            state.income.me = parseFloat(document.getElementById('inc-me').value) || 0;
            state.income.spouse = parseFloat(document.getElementById('inc-spouse').value) || 0;

            const plannerRef = doc(db, 'artifacts', appId, 'users', uid, 'planner', 'current');
            await setDoc(plannerRef, state);
            document.getElementById('status-text').innerText = "Gespeichert " + new Date().toLocaleTimeString();
        }

        window.switchTab = (tab) => {
            const planner = document.getElementById('view-planner');
            const archiveView = document.getElementById('view-archive');
            const tPlanner = document.getElementById('tab-planner');
            const tArchive = document.getElementById('tab-archive');

            if (tab === 'planner') {
                planner.classList.remove('hidden');
                archiveView.classList.add('hidden');
                tPlanner.className = 'px-6 py-3 text-xs font-bold uppercase tracking-widest tab-active';
                tArchive.className = 'px-6 py-3 text-xs font-bold uppercase tracking-widest text-slate-400';
            } else {
                planner.classList.add('hidden');
                archiveView.classList.remove('hidden');
                tArchive.className = 'px-6 py-3 text-xs font-bold uppercase tracking-widest tab-active';
                tPlanner.className = 'px-6 py-3 text-xs font-bold uppercase tracking-widest text-slate-400';
                renderArchive();
            }
        };

        function renderPlanner() {
            if (!state) return;
            document.getElementById('inc-me').value = state.income.me;
            document.getElementById('inc-spouse').value = state.income.spouse;

            const fixedCont = document.getElementById('fixed-costs-container');
            fixedCont.innerHTML = '';
            state.fixedCosts.forEach((item, i) => fixedCont.appendChild(createCostRow(item, i, 'fixed')));

            const variCont = document.getElementById('variable-costs-container');
            variCont.innerHTML = '';
            state.variableCosts.forEach((item, i) => variCont.appendChild(createCostRow(item, i, 'variable')));

            updateCalculations();
        }

        function createCostRow(item, index, type) {
            const div = document.createElement('div');
            div.className = 'flex flex-col p-3 bg-slate-50 rounded-xl border border-slate-100';
            div.innerHTML = `
                <div class="flex justify-between items-center gap-2 mb-2">
                    <div class="flex items-center gap-2 flex-grow">
                        <input type="text" value="${item.name}" onchange="updateItem('${type}', ${index}, 'name', this.value)" 
                               class="bg-transparent text-xs font-bold outline-none flex-grow" placeholder="Bezeichnung">
                        ${item.receipt ? `
                            <button onclick="openModal('${item.receipt}')" class="text-indigo-600">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        ` : ''}
                    </div>
                    <div class="flex items-center gap-1 font-black">
                        <span class="text-[10px] opacity-20 uppercase">CHF</span>
                        <input type="number" value="${item.amount}" oninput="updateItem('${type}', ${index}, 'amount', this.value)" 
                               class="bg-transparent text-right w-20 outline-none text-xs">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <label class="cursor-pointer flex items-center gap-1">
                        <input type="file" class="hidden" onchange="handleFile(event, '${type}', ${index})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${item.receipt ? '#10b981' : '#cbd5e1'}" stroke-width="3"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        <span class="text-[8px] font-bold uppercase ${item.receipt ? 'text-emerald-500' : 'text-slate-300'}">${item.receipt ? 'Foto OK' : 'Beleg'}</span>
                    </label>
                    <button onclick="removeRow('${type}', ${index})" class="text-slate-200 hover:text-rose-500">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            `;
            return div;
        }

        window.updateItem = (type, index, key, value) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list[index][key] = key === 'amount' ? parseFloat(value) || 0 : value;
            debouncedSave();
        };

        window.addRow = (type) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.push({ name: '', amount: 0, receipt: null });
            renderPlanner();
            debouncedSave();
        };

        window.removeRow = (type, index) => {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.splice(index, 1);
            renderPlanner();
            debouncedSave();
        };

        function updateCalculations() {
            if (!state) return;
            const incMe = parseFloat(document.getElementById('inc-me').value) || 0;
            const incSp = parseFloat(document.getElementById('inc-spouse').value) || 0;
            const totalInc = incMe + incSp;
            
            const totalFixed = state.fixedCosts.reduce((sum, item) => sum + (item.amount || 0), 0);
            const totalVari = state.variableCosts.reduce((sum, item) => sum + (item.amount || 0), 0);
            const totalExp = totalFixed + totalVari;

            const format = (val) => new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(val);
            document.getElementById('display-inc').innerText = format(totalInc);
            document.getElementById('display-exp').innerText = format(totalExp);
            document.getElementById('display-saved').innerText = format(totalInc - totalExp);
        }

        window.archiveCurrentMonth = async () => {
            if (!auth.currentUser) return;
            const monthName = new Intl.DateTimeFormat('de-CH', { month: 'long', year: 'numeric' }).format(new Date());
            const totalInc = (parseFloat(document.getElementById('inc-me').value) || 0) + (parseFloat(document.getElementById('inc-spouse').value) || 0);
            const totalExp = state.fixedCosts.reduce((s,i)=>s+i.amount,0) + state.variableCosts.reduce((s,i)=>s+i.amount,0);
            
            const uid = auth.currentUser.uid;
            const archiveId = "m_" + Date.now();
            const archiveEntry = {
                ...state,
                monthName,
                id: archiveId,
                totals: { inc: totalInc, exp: totalExp, saved: totalInc - totalExp }
            };

            await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'archive', archiveId), archiveEntry);
            
            // Reset Planner in Cloud
            state = JSON.parse(JSON.stringify(defaultState));
            await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'planner', 'current'), state);
            
            alert("Monat archiviert!");
            renderPlanner();
            switchTab('archive');
        };

        function renderArchive() {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            if (archive.length === 0) {
                list.innerHTML = `<div class="text-center py-12 text-slate-300 text-xs font-bold uppercase">Archiv ist leer</div>`;
                return;
            }
            archive.sort((a, b) => b.id.localeCompare(a.id)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center';
                div.innerHTML = `
                    <div onclick="restoreArchive('${item.id}')" class="cursor-pointer flex-grow">
                        <p class="text-[10px] font-black text-indigo-600 uppercase">${item.monthName}</p>
                        <p class="text-lg font-black">${new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(item.totals.saved)}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteArchive('${item.id}')" class="p-2 text-slate-300 hover:text-rose-500">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.deleteArchive = async (id) => {
            if (!confirm("Löschen?") || !auth.currentUser) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'archive', id));
        };

        window.restoreArchive = async (id) => {
            const item = archive.find(a => a.id === id);
            if (!item || !confirm("Diesen Monat zur Bearbeitung in den Planer laden?")) return;
            state = JSON.parse(JSON.stringify(item));
            delete state.id;
            delete state.monthName;
            delete state.totals;
            renderPlanner();
            switchTab('planner');
        };

        window.handleFile = (e, type, index) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
                list[index].receipt = event.target.result;
                renderPlanner();
                debouncedSave();
            };
            reader.readAsDataURL(file);
        };

        window.openModal = (src) => {
            document.getElementById('modal-img').src = src;
            document.getElementById('receipt-modal').classList.add('active');
        };
        window.closeModal = () => document.getElementById('receipt-modal').classList.remove('active');
    </script>
</body>
</html>
