<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Web Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print { .no-print { display: none; } }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center no-print">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-indigo-600 uppercase">BUDGET PRO</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Lokal Gespeichert</p>
        </div>
        <div class="flex gap-2">
            <button onclick="window.print()" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex justify-center border-b border-slate-200 bg-white no-print">
        <button id="tab-planner" onclick="switchTab('planner')" class="px-6 py-3 text-xs font-bold uppercase tracking-widest tab-active">Planer</button>
        <button id="tab-archive" onclick="switchTab('archive')" class="px-6 py-3 text-xs font-bold uppercase tracking-widest text-slate-400">Archiv</button>
    </div>

    <main id="app" class="max-w-2xl mx-auto p-4 space-y-6">
        
        <!-- PLANNER VIEW -->
        <div id="view-planner" class="space-y-6">
            <!-- Dashboard -->
            <div class="bg-indigo-600 text-white p-8 rounded-[2rem] shadow-xl shadow-indigo-100 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest mb-1">Verfügbares Budget</p>
                    <h2 id="display-saved" class="text-4xl font-black mb-6">CHF 0.00</h2>
                    <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/20">
                        <div>
                            <p class="text-[10px] uppercase font-bold opacity-60">Einnahmen</p>
                            <p id="display-inc" class="font-bold text-sm">CHF 0.00</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] uppercase font-bold opacity-60">Ausgaben</p>
                            <p id="display-exp" class="font-bold text-sm">CHF 0.00</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
            </div>

            <!-- Einnahmen -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Einnahmen</h3>
                <div class="space-y-2">
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-500">Mein Lohn</span>
                        <input type="number" id="inc-me" oninput="updateStateFromUI()" class="bg-transparent text-right font-black w-24 outline-none">
                    </div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-xs font-bold text-slate-500">Partner / Sonstiges</span>
                        <input type="number" id="inc-spouse" oninput="updateStateFromUI()" class="bg-transparent text-right font-black w-24 outline-none">
                    </div>
                </div>
            </section>

            <!-- Fixkosten -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black uppercase text-slate-400">Fixkosten</h3>
                    <span class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded">Monatlich</span>
                </div>
                <div id="fixed-costs-container" class="space-y-3"></div>
                <button onclick="addRow('fixed')" class="w-full mt-4 py-3 border-2 border-dashed border-slate-100 rounded-xl text-[10px] font-bold text-slate-400 uppercase hover:bg-slate-50 transition-all">
                    + Zeile hinzufügen
                </button>
            </section>

            <!-- Variable Kosten -->
            <section class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Variable Ausgaben</h3>
                <div id="variable-costs-container" class="space-y-3"></div>
                <button onclick="addRow('variable')" class="w-full mt-4 py-3 border-2 border-dashed border-slate-100 rounded-xl text-[10px] font-bold text-slate-400 uppercase hover:bg-slate-50 transition-all">
                    + Ausgabe hinzufügen
                </button>
            </section>

            <button onclick="archiveCurrentMonth()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest no-print shadow-lg hover:bg-black transition-all">
                Monat abschliessen & Archivieren
            </button>
        </div>

        <!-- ARCHIVE VIEW -->
        <div id="view-archive" class="hidden space-y-4">
            <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Vergangene Monate</h3>
            <div id="archive-list" class="space-y-3">
                <!-- Archivierte Monate werden hier gelistet -->
            </div>
        </div>
    </main>

    <script>
        // Initial-Daten (Default)
        const defaultState = {
            id: null,
            monthName: "",
            income: { me: 5500, spouse: 0 },
            fixedCosts: [
                { name: 'Miete', amount: 2402 },
                { name: 'Auto', amount: 665 },
                { name: 'swisscom', amount: 179.80 },
                { name: 'Spende', amount: 10 },
                { name: 'Diganti', amount: 400 },
                { name: 'Lebensmittel', amount: 1500 },
                { name: 'Ajdin', amount: 350 },
                { name: '3. Säule', amount: 300 },
                { name: 'Krankenkasse Ajdin', amount: 165.45 },
                { name: 'Krankenkasse Elma', amount: 369.05 },
                { name: 'MediaMarkt', amount: 60 },
                { name: 'Leistungsabrechnung CSS', amount: 0 },
                { name: 'Steuer', amount: 99.60 }
            ],
            variableCosts: []
        };

        let state = JSON.parse(JSON.stringify(defaultState));
        let archive = JSON.parse(localStorage.getItem('budget_archive')) || [];

        function formatCHF(val) {
            return new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF' }).format(val);
        }

        function switchTab(tab) {
            const planner = document.getElementById('view-planner');
            const archiveView = document.getElementById('view-archive');
            const tPlanner = document.getElementById('tab-planner');
            const tArchive = document.getElementById('tab-archive');

            if (tab === 'planner') {
                planner.classList.remove('hidden');
                archiveView.classList.add('hidden');
                tPlanner.classList.add('tab-active');
                tPlanner.classList.remove('text-slate-400');
                tArchive.classList.remove('tab-active');
                tArchive.classList.add('text-slate-400');
            } else {
                planner.classList.add('hidden');
                archiveView.classList.remove('hidden');
                tArchive.classList.add('tab-active');
                tArchive.classList.remove('text-slate-400');
                tPlanner.classList.remove('tab-active');
                tPlanner.classList.add('text-slate-400');
                renderArchive();
            }
        }

        function renderPlanner() {
            document.getElementById('inc-me').value = state.income.me;
            document.getElementById('inc-spouse').value = state.income.spouse;

            const fixedCont = document.getElementById('fixed-costs-container');
            fixedCont.innerHTML = '';
            state.fixedCosts.forEach((item, i) => fixedCont.appendChild(createCostRow(item, i, 'fixed')));

            const variCont = document.getElementById('variable-costs-container');
            variCont.innerHTML = '';
            state.variableCosts.forEach((item, i) => variCont.appendChild(createCostRow(item, i, 'variable')));

            updateCalculations();
        }

        function createCostRow(item, index, type) {
            const div = document.createElement('div');
            div.className = 'flex flex-col p-3 bg-slate-50 rounded-xl border border-slate-100';
            div.innerHTML = `
                <div class="flex justify-between items-center gap-2 mb-2">
                    <input type="text" value="${item.name}" onchange="updateItem('${type}', ${index}, 'name', this.value)" 
                           class="bg-transparent text-xs font-bold outline-none flex-grow" placeholder="Bezeichnung">
                    <div class="flex items-center gap-1 font-black">
                        <span class="text-[10px] opacity-20 uppercase font-bold">CHF</span>
                        <input type="number" value="${item.amount}" oninput="updateItem('${type}', ${index}, 'amount', this.value)" 
                               class="bg-transparent text-right w-20 outline-none text-xs">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex gap-4">
                        <label class="cursor-pointer flex items-center gap-1">
                            <input type="file" class="hidden" onchange="handleFile(event, '${type}', ${index})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${item.receipt ? '#10b981' : '#cbd5e1'}" stroke-width="3"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            <span class="text-[9px] font-bold uppercase ${item.receipt ? 'text-emerald-500' : 'text-slate-300'}">${item.receipt ? 'Beleg OK' : 'Scan'}</span>
                        </label>
                    </div>
                    <button onclick="removeRow('${type}', ${index})" class="text-slate-300 hover:text-rose-500">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            `;
            return div;
        }

        function updateItem(type, index, key, value) {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list[index][key] = key === 'amount' ? parseFloat(value) || 0 : value;
            updateCalculations();
        }

        function updateStateFromUI() {
            state.income.me = parseFloat(document.getElementById('inc-me').value) || 0;
            state.income.spouse = parseFloat(document.getElementById('inc-spouse').value) || 0;
            updateCalculations();
        }

        function addRow(type) {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.push({ name: '', amount: 0, receipt: null });
            renderPlanner();
        }

        function removeRow(type, index) {
            const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
            list.splice(index, 1);
            renderPlanner();
        }

        function updateCalculations() {
            const totalInc = state.income.me + state.income.spouse;
            const totalFixed = state.fixedCosts.reduce((sum, item) => sum + (item.amount || 0), 0);
            const totalVari = state.variableCosts.reduce((sum, item) => sum + (item.amount || 0), 0);
            const totalExp = totalFixed + totalVari;

            document.getElementById('display-inc').innerText = formatCHF(totalInc);
            document.getElementById('display-exp').innerText = formatCHF(totalExp);
            document.getElementById('display-saved').innerText = formatCHF(totalInc - totalExp);
        }

        function archiveCurrentMonth() {
            const monthName = new Intl.DateTimeFormat('de-CH', { month: 'long', year: 'numeric' }).format(new Date());
            const totalInc = state.income.me + state.income.spouse;
            const totalExp = state.fixedCosts.reduce((s,i)=>s+i.amount,0) + state.variableCosts.reduce((s,i)=>s+i.amount,0);
            
            const entry = {
                ...JSON.parse(JSON.stringify(state)),
                id: state.id || Date.now(),
                monthName: monthName,
                totals: { inc: totalInc, exp: totalExp, saved: totalInc - totalExp }
            };

            // Falls es eine Bearbeitung war, alten Eintrag ersetzen
            const existingIdx = archive.findIndex(a => a.id === entry.id);
            if (existingIdx > -1) {
                archive[existingIdx] = entry;
            } else {
                archive.unshift(entry);
            }

            localStorage.setItem('budget_archive', JSON.stringify(archive));
            alert("Monat erfolgreich im Archiv gespeichert!");
            
            // Reset Planner
            state = JSON.parse(JSON.stringify(defaultState));
            renderPlanner();
            switchTab('archive');
        }

        function renderArchive() {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            
            if (archive.length === 0) {
                list.innerHTML = `<div class="text-center py-12 text-slate-300 text-xs font-bold uppercase">Noch keine Monate archiviert</div>`;
                return;
            }

            archive.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center hover:border-indigo-300 transition-all group';
                div.innerHTML = `
                    <div onclick="loadFromArchive(${item.id})" class="cursor-pointer flex-grow">
                        <p class="text-[10px] font-black text-indigo-600 uppercase tracking-tighter">${item.monthName}</p>
                        <p class="text-lg font-black">${formatCHF(item.totals.saved)}</p>
                        <div class="flex gap-4 text-[9px] font-bold text-slate-400 mt-1 uppercase">
                            <span>E: ${formatCHF(item.totals.inc)}</span>
                            <span>A: ${formatCHF(item.totals.exp)}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadFromArchive(${item.id})" class="p-2 text-slate-300 hover:text-indigo-600">
                             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onclick="deleteFromArchive(${item.id})" class="p-2 text-slate-300 hover:text-rose-500">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function loadFromArchive(id) {
            const entry = archive.find(a => a.id === id);
            if (!entry) return;
            state = JSON.parse(JSON.stringify(entry));
            renderPlanner();
            switchTab('planner');
        }

        function deleteFromArchive(id) {
            if (!confirm("Diesen Monat wirklich aus dem Archiv löschen?")) return;
            archive = archive.filter(a => a.id !== id);
            localStorage.setItem('budget_archive', JSON.stringify(archive));
            renderArchive();
        }

        function handleFile(e, type, index) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const list = type === 'fixed' ? state.fixedCosts : state.variableCosts;
                list[index].receipt = event.target.result;
                renderPlanner();
            };
            reader.readAsDataURL(file);
        }

        // Init
        window.onload = () => {
            renderPlanner();
        };
    </script>
</body>
</html>
